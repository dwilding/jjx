name: Unit tests

on:
  pull_request:
  push:
    branches:
      - main

permissions: {}

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
      - name: Run unit tests
        env:
          UV_PYTHON: '3.10'
        run: uvx --from rust-just@1.52.0 just unit
