name: Functional tests

on:
  pull_request:

permissions: {}

jobs:
  functional:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install bubblewrap
        run: sudo apt-get install -y bubblewrap apparmor
      - name: Configure AppArmor policy for bubblewrap
        shell: bash
        run: |
          set -euxo pipefail
          BWRAP_PATH="$(command -v bwrap)"
          sudo tee /etc/apparmor.d/jjx-bwrap >/dev/null <<EOF
          abi <abi/4.0>,
          include <tunables/global>
          profile jjx-bwrap ${BWRAP_PATH} flags=(unconfined) {
            userns,
            include if exists <local/jjx-bwrap>
          }
          EOF
          sudo apparmor_parser -r /etc/apparmor.d/jjx-bwrap
          bwrap --ro-bind / / --dev /dev --proc /proc -- true
      - name: Run functional tests
        env:
          UV_PYTHON: '3.10'
        shell: bash
        run: uvx --from rust-just just functional
